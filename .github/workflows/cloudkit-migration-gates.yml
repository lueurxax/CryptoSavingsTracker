name: cloudkit-migration-gates

on:
  pull_request:
    paths:
      - 'ios/**'
      - 'docs/**'
      - 'scripts/**'
      - '.github/workflows/cloudkit-migration-gates.yml'
  push:
    branches:
      - 'release/**'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Gate mode'
        required: false
        type: choice
        options:
          - pr
          - release
        default: pr

jobs:
  policy-cloudkit-repository-truth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: |
          python3 scripts/check_cloudkit_phase1_repository_truth.py             --report-out artifacts/cloudkit/repository-truth-report.json
      - uses: actions/upload-artifact@v4
        with:
          name: cloudkit-repository-truth-report
          path: artifacts/cloudkit/repository-truth-report.json

  policy-cloudkit-release-evidence:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: |
          python3 scripts/check_cloudkit_release_evidence.py             --release-dir docs/release/cloudkit/latest             --report-out artifacts/cloudkit/release-evidence-report.json
      - uses: actions/upload-artifact@v4
        with:
          name: cloudkit-release-evidence-report
          path: artifacts/cloudkit/release-evidence-report.json
