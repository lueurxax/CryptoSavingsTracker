<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#EEF2F7"/>
  <rect x="0" y="0" width="1600" height="240" fill="#F8FBFF"/>
  <circle cx="1450" cy="120" r="210" fill="#D9ECFF" fill-opacity="0.55"/>
  <circle cx="130" cy="780" r="180" fill="#E7F3E9" fill-opacity="0.45"/>

  <text x="72" y="82" fill="#2F6FED" font-size="18" font-family="Avenir Next, Inter, sans-serif" font-weight="700" letter-spacing="1.5">PRODUCT UI</text>
  <text x="72" y="138" fill="#101828" font-size="48" font-family="Avenir Next, Inter, sans-serif" font-weight="700">Planning setup and monthly priorities</text>
  <text x="72" y="178" fill="#475467" font-size="24" font-family="Avenir Next, Inter, sans-serif">Monthly planning is now split into dedicated screenshots so the flow is easier to understand.</text>

  <rect x="72" y="220" width="690" height="620" rx="32" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <rect x="108" y="252" width="618" height="370" rx="26" fill="#F7F9FC"/>
  <rect x="296" y="270" width="242" height="334" rx="34" fill="#FFFFFF" stroke="#D8E2F0" stroke-width="2" filter="url(#shadow)"/>
  <image href="../selected/05-planning-settings.png" x="307" y="281" width="220" height="312" preserveAspectRatio="xMidYMid meet"/>
  <rect x="108" y="650" width="150" height="34" rx="17" fill="#EAF2FF"/>
  <text x="130" y="672" fill="#2F6FED" font-size="18" font-family="Avenir Next, Inter, sans-serif" font-weight="600">Current screen</text>
  <text x="108" y="726" fill="#101828" font-size="34" font-family="Avenir Next, Inter, sans-serif" font-weight="700">Planning settings</text>
  <text x="108" y="768" fill="#475467" font-size="24" font-family="Avenir Next, Inter, sans-serif">Set display currency, monthly budget, payment day,</text>
  <text x="108" y="800" fill="#475467" font-size="24" font-family="Avenir Next, Inter, sans-serif">and reminders in one place.</text>

  <rect x="838" y="220" width="690" height="620" rx="32" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <rect x="874" y="252" width="618" height="370" rx="26" fill="#F7F9FC"/>
  <rect x="1062" y="270" width="242" height="334" rx="34" fill="#FFFFFF" stroke="#D8E2F0" stroke-width="2" filter="url(#shadow)"/>
  <image href="../selected/06-planning-goals.png" x="1073" y="281" width="220" height="312" preserveAspectRatio="xMidYMid meet"/>
  <rect x="874" y="650" width="150" height="34" rx="17" fill="#EAF2FF"/>
  <text x="896" y="672" fill="#2F6FED" font-size="18" font-family="Avenir Next, Inter, sans-serif" font-weight="600">Current screen</text>
  <text x="874" y="726" fill="#101828" font-size="34" font-family="Avenir Next, Inter, sans-serif" font-weight="700">Planning goals</text>
  <text x="874" y="768" fill="#475467" font-size="24" font-family="Avenir Next, Inter, sans-serif">Review the monthly budget gap and see which goals</text>
  <text x="874" y="800" fill="#475467" font-size="24" font-family="Avenir Next, Inter, sans-serif">need attention first.</text>
</svg>
