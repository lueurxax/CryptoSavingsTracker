<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#EEF2F7"/>
  <rect x="0" y="0" width="1600" height="240" fill="#F8FBFF"/>
  <circle cx="1420" cy="110" r="220" fill="#DDEBFF" fill-opacity="0.58"/>
  <circle cx="180" cy="770" r="190" fill="#EAF7EE" fill-opacity="0.50"/>

  <text x="72" y="82" fill="#2F6FED" font-size="18" font-family="Avenir Next, Inter, sans-serif" font-weight="700" letter-spacing="1.5">PRODUCT UI</text>
  <text x="72" y="138" fill="#101828" font-size="48" font-family="Avenir Next, Inter, sans-serif" font-weight="700">Goal setup and asset onboarding</text>
  <text x="72" y="178" fill="#475467" font-size="24" font-family="Avenir Next, Inter, sans-serif">Configuration screens should stay in the deck, but each one needs more room and a short explanation.</text>

  <rect x="72" y="220" width="690" height="620" rx="32" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <rect x="108" y="252" width="618" height="370" rx="26" fill="#F7F9FC"/>
  <rect x="296" y="270" width="242" height="334" rx="34" fill="#FFFFFF" stroke="#D8E2F0" stroke-width="2" filter="url(#shadow)"/>
  <image href="../selected/03-edit-goal.png" x="307" y="281" width="220" height="312" preserveAspectRatio="xMidYMid meet"/>
  <rect x="108" y="650" width="150" height="34" rx="17" fill="#EAF2FF"/>
  <text x="130" y="672" fill="#2F6FED" font-size="18" font-family="Avenir Next, Inter, sans-serif" font-weight="600">Current screen</text>
  <text x="108" y="726" fill="#101828" font-size="34" font-family="Avenir Next, Inter, sans-serif" font-weight="700">Edit goal</text>
  <text x="108" y="768" fill="#475467" font-size="24" font-family="Avenir Next, Inter, sans-serif">Configure target amount, reminders, and product</text>
  <text x="108" y="800" fill="#475467" font-size="24" font-family="Avenir Next, Inter, sans-serif">metadata in one focused form.</text>

  <rect x="838" y="220" width="690" height="620" rx="32" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <rect x="874" y="252" width="618" height="370" rx="26" fill="#F7F9FC"/>
  <rect x="1062" y="270" width="242" height="334" rx="34" fill="#FFFFFF" stroke="#D8E2F0" stroke-width="2" filter="url(#shadow)"/>
  <image href="../selected/04-add-asset.png" x="1073" y="281" width="220" height="312" preserveAspectRatio="xMidYMid meet"/>
  <rect x="874" y="650" width="150" height="34" rx="17" fill="#EAF2FF"/>
  <text x="896" y="672" fill="#2F6FED" font-size="18" font-family="Avenir Next, Inter, sans-serif" font-weight="600">Current screen</text>
  <text x="874" y="726" fill="#101828" font-size="34" font-family="Avenir Next, Inter, sans-serif" font-weight="700">Add asset</text>
  <text x="874" y="768" fill="#475467" font-size="24" font-family="Avenir Next, Inter, sans-serif">Attach a crypto or fiat asset and enable on-chain</text>
  <text x="874" y="800" fill="#475467" font-size="24" font-family="Avenir Next, Inter, sans-serif">tracking from the same setup screen.</text>
</svg>
